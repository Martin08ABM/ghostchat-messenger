<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#052e16; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a; stop-opacity:1"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Two overlapping chat bubbles — abstract "conversation" -->
  <!-- Left bubble (received) -->
  <rect x="80" y="160" width="240" height="150" rx="28" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="3"/>
  <polygon points="108,310 80,345 148,310" fill="#1a1a1a"/>

  <!-- Right bubble (sent) -->
  <rect x="192" y="210" width="240" height="150" rx="28" fill="#166534" stroke="#16a34a" stroke-width="2"/>
  <polygon points="404,360 432,395 364,360" fill="#166534"/>

  <!-- Ghost face peeking from left bubble -->
  <!-- Mini ghost inside left bubble -->
  <ellipse cx="175" cy="235" rx="38" ry="42" fill="#e0e0e0"/>
  <rect x="137" y="258" width="76" height="25" fill="#e0e0e0"/>
  <!-- wiggly bottom -->
  <path d="M137 283 Q149 298 161 283 Q173 268 185 283 Q197 298 209 283 Q213 290 213 295 L137 295Z" fill="#e0e0e0"/>
  <!-- tiny eyes -->
  <circle cx="163" cy="233" r="7" fill="#0a0a0a"/>
  <circle cx="187" cy="233" r="7" fill="#0a0a0a"/>
  <circle cx="165" cy="230" r="3" fill="#fff"/>
  <circle cx="189" cy="230" r="3" fill="#fff"/>

  <!-- "G" letter in right bubble -->
  <text x="312" y="304" font-family="system-ui, sans-serif" font-weight="700"
    font-size="90" fill="#4ade80" text-anchor="middle">G</text>
</svg>
