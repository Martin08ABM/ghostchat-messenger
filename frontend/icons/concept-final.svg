<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow below ghost -->
  <ellipse cx="256" cy="310" rx="130" ry="28" fill="#4ade80" opacity="0.07"/>

  <!-- Ghost body (rounded, concept-2 shape) -->
  <path d="M256 88
    C182 88 136 144 136 208
    L136 370
    C136 370 166 348 196 370
    C226 392 256 370 256 370
    C256 370 286 392 316 370
    C346 348 376 370 376 370
    L376 208
    C376 144 330 88 256 88Z"
    fill="url(#ghostGrad)"/>

  <!-- Eyes — dark with green shine (concept-2 style) -->
  <ellipse cx="220" cy="225" rx="22" ry="26" fill="#111827"/>
  <ellipse cx="292" cy="225" rx="22" ry="26" fill="#111827"/>
  <circle cx="226" cy="218" r="8" fill="#4ade80" opacity="0.9"/>
  <circle cx="298" cy="218" r="8" fill="#4ade80" opacity="0.9"/>

  <!-- Lock on chest (concept-2) -->
  <rect x="234" y="295" width="44" height="34" rx="5" fill="#111827"/>
  <path d="M242 295 L242 284 C242 272 270 272 270 284 L270 295"
