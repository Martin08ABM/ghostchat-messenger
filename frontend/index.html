<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ghostchat Messenger | Keep your messages private</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <!-- Header -->
  <header id="top-bar">
    <div id="identity">
      <span id="identity-label">Your code:</span>
      <span id="my-id">-</span>
      <button id="btn-copy">Copy</button>
      <button id="btn-qr">QR</button>
      <button id="btn-refresh">Refresh</button>
    </div>
    <div id="header-right">
      <button id="btn-theme">☀/☾</button>
      <span id="status">Disconnected</span>
    </div>
  </header>

  <!-- QR modal -->
  <div id="qr-modal" hidden>
    <div id="qr-backdrop"></div>
    <div id="qr-box">
      <p id="qr-label">Scan to share your code</p>
      <div id="qr-canvas"></div>
      <button id="qr-close">Close</button>
    </div>
  </div>

  <!-- Connection zone with peer -->
  <div id="peer-section">
    <input type="text" id="peer-input" placeholder="Contact code" autocomplete="off">
    <button id="btn-connect-peer">Connect</button>
  </div>

  <!-- Messages area -->
  <main id="messages"></main>

  <!-- Typing indicator -->
  <div id="typing-indicator"></div>

  <!-- Send messages -->
  <form id="message-form">
    <input type="text" id="message-input" placeholder="Write a message..." autocomplete="off">
    <button type="submit" id="btn-send">Send</button>
  </form>

  <!-- QR library (client-side only, no data sent to external servers) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
