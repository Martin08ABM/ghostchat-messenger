  <circle cx="256" cy="312" r="5" fill="#4ade80"/>

  <!-- Chat bubble top-right (concept-1) -->
  <rect x="302" y="106" width="90" height="56" rx="12" fill="#4ade80"/>
  <polygon points="312,162 296,180 334,162" fill="#4ade80"/>
  <circle cx="327" cy="134" r="6" fill="#111827"/>
  <circle cx="347" cy="134" r="6" fill="#111827"/>
  <circle cx="367" cy="134" r="6" fill="#111827"/>
