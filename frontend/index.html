<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ghostchat Messenger | Keep your messages private</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="./css/styles.css">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="6be76cd5-7092-42ab-b301-e82790bfcc15"></script>
</head>
<body>

  <!-- Header -->
  <header id="top-bar">
    <div id="identity">
      <span id="identity-label">Your code:</span>
      <span id="my-id">-</span>
      <button id="btn-copy">Copy</button>
      <button id="btn-qr">QR</button>
      <button id="btn-refresh">Refresh</button>
    </div>
    <div id="header-right">
      <button id="btn-theme">☀/☾</button>
      <span id="status">Disconnected</span>
    </div>
  </header>

  <!-- Main app: sidebar + chat -->
  <div id="app">

    <!-- Sidebar: contact list -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">Contacts</span>
        <button id="btn-add-contact">+</button>
      </div>
      <ul id="contact-list"></ul>
    </aside>

    <!-- Chat panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <button id="btn-back">←</button>
        <span id="chat-contact-name"></span>
      </div>
      <div id="chat-placeholder">Select a contact to start chatting</div>
      <main id="messages" hidden></main>
      <div id="typing-indicator"></div>
      <div id="file-progress" hidden>
        <span id="file-progress-label"></span>
        <div id="file-progress-track"><div id="file-progress-fill"></div></div>
        <span id="file-progress-pct">0%</span>
      </div>
      <div id="file-preview" hidden>
        <img id="file-preview-img" hidden alt="preview">
        <span id="file-preview-name"></span>
        <button type="button" id="file-preview-clear" title="Remove file">×</button>
      </div>
      <form id="message-form" hidden>
        <input type="file" name="file-send" id="file-send" style="display:none">
        <label for="file-send" id="file-send-label" title="Attach file">&#43</label>
        <input type="text" id="message-input" placeholder="Write a message..." autocomplete="off">
        <button type="submit" id="btn-send">Send</button>
      </form>
    </div>

  </div>

  <!-- Add contact modal -->
  <div id="add-contact-modal" hidden>
    <div id="add-contact-backdrop"></div>
    <div id="add-contact-box">
      <h3>Add contact</h3>
      <input type="text" id="add-contact-code" placeholder="Contact code" autocomplete="off" spellcheck="false">
      <input type="text" id="add-contact-nickname" placeholder="Nickname (optional)" autocomplete="off">
      <div id="add-contact-actions">
        <button id="add-contact-cancel">Cancel</button>
        <button id="add-contact-confirm">Add</button>
      </div>
    </div>
  </div>

  <!-- QR modal -->
  <div id="qr-modal" hidden>
    <div id="qr-backdrop"></div>
    <div id="qr-box">
      <p id="qr-label">Scan to share your code</p>
      <div id="qr-canvas"></div>
      <button id="qr-close">Close</button>
    </div>
  </div>

  <!-- File incoming modal -->
  <div id="file-incoming-modal" hidden>
    <div id="file-incoming-backdrop"></div>
    <div id="file-incoming-box">
      <h3>Incoming file</h3>
      <p id="file-incoming-sender"></p>
      <p id="file-incoming-info"></p>
      <div id="file-incoming-actions">
        <button id="file-incoming-reject">Reject</button>
        <button id="file-incoming-accept">Accept</button>
        <p>Remember to save the received files, as you can't view them multiple times</p>
      </div>
    </div>
  </div>

  <!-- QR library (client-side only, no data sent to external servers) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
